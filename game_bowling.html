<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hand Cricket - Bowling</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #game-over-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f172a; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .letter { display: inline-block; font-size: 4rem; font-weight: bold; animation: popIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .score-container { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .box { width: 100px; height: 100px; border: 2px solid #f87171; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.2rem; background: #1e293b; }
        .num-pad { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 600px; margin: 20px auto; }
        .num-btn { padding: 20px; background: #1e293b; border: 1px solid #f87171; color: white; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="game-over-screen"></div>
    <h1>Bowling Time!</h1>
    <div class="score-container">
        <div class="box">AI BOT<div id="aiScore">?</div></div>
        <div class="box">TARGET<div id="targetDisplay">---</div></div>
        <div class="box">YOU<div id="userScore">?</div></div>
    </div>
    <div style="font-size: 3rem;" id="aiTotalScore">0</div>
    <div class="num-pad" id="buttonsContainer"></div>

    <script>
        let aiTotal = 0;
        const savedTarget = localStorage.getItem('targetScore');
        document.getElementById('targetDisplay').innerText = (savedTarget && savedTarget !== "0") ? savedTarget : "---";

        const container = document.getElementById('buttonsContainer');
        for(let i=0; i<=10; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn'; btn.innerText = i;
            btn.onclick = () => play(i);
            container.appendChild(btn);
        }

        function play(n) {
            let comp = Math.floor(Math.random() * 11);
            document.getElementById('userScore').innerText = n;
            document.getElementById('aiScore').innerText = comp;

            if (n === comp) {
                if (savedTarget && savedTarget !== "0") {
                    // രണ്ടാമത്തെ ഇന്നിംഗ്സ് - ബൗളിംഗ് കഴിഞ്ഞ് ഗെയിം ഓവർ
                    showGameOver(aiTotal < savedTarget ? "YOU WON!" : "YOU LOST!");
                } else {
                    // ഒന്നാമത്തെ ഇന്നിംഗ്സ് - ടാർഗറ്റ് സെറ്റ് ചെയ്ത് ബാറ്റിംഗിലേക്ക്
                    localStorage.setItem('targetScore', aiTotal);
                    window.location.href = 'game_batting.html';
                }
            } else {
                aiTotal += comp;
                document.getElementById('aiTotalScore').innerText = aiTotal;
                if (savedTarget && aiTotal > savedTarget) {
                    showGameOver("YOU LOST!");
                }
            }
        }

        function showGameOver(text) {
            const screen = document.getElementById('game-over-screen');
            screen.style.display = 'flex';
            const msg = "GAME OVER";
            msg.split('').forEach((char, i) => {
                setTimeout(() => {
                    const span = document.createElement('span');
                    span.className = 'letter';
                    span.innerText = char;
                    screen.appendChild(span);
                }, i * 300);
            });
            setTimeout(() => {
                const h2 = document.createElement('h2');
                h2.innerText = text;
                screen.appendChild(h2);
            }, 3000);
            setTimeout(() => { localStorage.removeItem('targetScore'); window.location.href = 'menu.html'; }, 4500);
        }
    </script>
</body>
</html>
