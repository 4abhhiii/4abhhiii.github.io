<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hand Cricket Game</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        #intro { font-size: 3rem; color: #38bdf8; margin-top: 100px; animation: pop 1s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .display-container { display: flex; justify-content: center; gap: 50px; margin: 50px 0; }
        .box { width: 100px; height: 100px; border: 2px solid #38bdf8; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .num-pad { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 600px; margin: 0 auto; }
        .num-btn { padding: 20px; background: #1e293b; border: 1px solid #38bdf8; color: white; cursor: pointer; font-size: 1.2rem; }
        .num-btn:active { transform: translateY(-5px); background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>

    <div id="intro">GOOD LUCK!</div>
    
    <div class="display-container" id="game-ui" style="display:none;">
        <div><p>AI BOT</p><div class="box" id="aiScore">?</div></div>
        <div><p>YOU</p><div class="box" id="userScore">?</div></div>
    </div>

    <div class="num-pad" id="controls" style="display:none;">
        <script>
            for(let i=0; i<=10; i++) {
                document.write(`<button class="num-btn" onclick="play(${i})">${i}</button>`);
            }
        </script>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('controls').style.display = 'grid';
        }, 2000);

        function play(n) {
            document.getElementById('userScore').innerText = n;
            let comp = Math.floor(Math.random() * 11);
            document.getElementById('aiScore').innerText = comp;
        }
    </script>
</body>
</html>
