<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hand Cricket - Batting</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }

        /* ആനിമേഷൻ */
        #intro-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; z-index: 10; animation: fadeOut 3s forwards; backdrop-filter: blur(5px); }
        #message { font-size: 2rem; color: #38bdf8; animation: slideUp 2s ease-out; }
        @keyframes slideUp { 0% { transform: translateY(100px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        h1 { color: #38bdf8; margin-bottom: 20px; }
        .score-container { display: flex; justify-content: center; align-items: center; gap: 30px; margin: 20px 0; }
        .box { width: 100px; height: 100px; border: 2px solid #38bdf8; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.2rem; background: #1e293b; }
        .score-display { background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #38bdf8; margin: 20px auto; max-width: 300px; }

        .num-pad { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 600px; margin: 20px auto; }
        .num-btn { padding: 20px; background: #1e293b; border: 1px solid #38bdf8; color: white; cursor: pointer; border-radius: 10px; font-size: 1.2rem; }
        .num-btn:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>

    <div id="intro-overlay"><div id="message">HELLO <span id="displayName"></span>! BATTING TIME</div></div>

    <h1>Are You Challenging Me</h1>

    <div class="score-container">
        <div class="box">AI BOT<div id="aiScore" style="font-size: 2rem;">?</div></div>
        <div style="color: #f87171; font-weight: bold;">PLAYER<br><span id="playerName"></span></div>
        <div class="box">YOU<div id="userScore" style="font-size: 2rem;">?</div></div>
    </div>

    <div class="score-display">
        <div style="font-size: 0.9rem; color: #94a3b8;">YOUR SCORE</div>
        <div id="totalScore" style="font-size: 3rem; color: #38bdf8;">0</div>
    </div>

    <div class="num-pad" id="buttonsContainer"></div>

    <script>
        // ലോഗിൻ ചെയ്ത പേര് സെറ്റ് ചെയ്യുന്നു
        const name = localStorage.getItem('username') || "Player";
        document.getElementById('displayName').innerText = name;
        document.getElementById('playerName').innerText = name;

        // ബട്ടണുകൾ ജനറേറ്റ് ചെയ്യുന്നു
        const container = document.getElementById('buttonsContainer');
        for(let i=0; i<=10; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => play(i);
            container.appendChild(btn);
        }

        let total = 0;
        function play(n) {
            let comp = Math.floor(Math.random() * 11);
            document.getElementById('userScore').innerText = n;
            document.getElementById('aiScore').innerText = comp;

            if (n === comp) {
                alert("OUT! " + name + ", your final score: " + total);
                localStorage.setItem('targetScore', total); // സ്കോർ സേവ് ചെയ്യുന്നു
                window.location.href = 'game_bowling.html'; // ബൗളിംഗിലേക്ക് മാറുന്നു
            } else {
                total += (n === 0) ? comp : n;
                document.getElementById('totalScore').innerText = total;
            }
        }
    </script>
</body>
</html>
