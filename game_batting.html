<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hand Cricket - Batting</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #splash-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f172a; display: none; align-items: center; justify-content: center; z-index: 20; font-size: 3rem; font-weight: bold; }
        .score-container { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .box { width: 100px; height: 100px; border: 2px solid #38bdf8; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.2rem; background: #1e293b; }
        .num-pad { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 600px; margin: 20px auto; }
        .num-btn { padding: 20px; background: #1e293b; border: 1px solid #38bdf8; color: white; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="splash-screen"></div>
    <h1>Batting Time!</h1>
    <div class="score-container">
        <div class="box">YOU<div id="userScore">?</div></div>
        <div class="box">TARGET<div id="targetDisplay">---</div></div>
        <div class="box">AI BOT<div id="aiScore">?</div></div>
    </div>
    <div style="font-size: 3rem;" id="userTotalScore">0</div>
    <div class="num-pad" id="buttonsContainer"></div>

    <script>
        let userTotal = 0;
        const savedTarget = localStorage.getItem('targetScore');
        document.getElementById('targetDisplay').innerText = (savedTarget && savedTarget !== "0") ? savedTarget : "---";

        const container = document.getElementById('buttonsContainer');
        for(let i=0; i<=10; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn'; btn.innerText = i;
            btn.onclick = () => play(i);
            container.appendChild(btn);
        }

        function play(n) {
            let comp = Math.floor(Math.random() * 11);
            document.getElementById('userScore').innerText = n;
            document.getElementById('aiScore').innerText = comp;

            if (n === comp) {
                if (savedTarget && savedTarget !== "0") {
                    if (userTotal > savedTarget) { showSplash("YOU WON!"); } 
                    else { showSplash("YOU LOST!"); }
                    localStorage.removeItem('targetScore');
                    setTimeout(() => window.location.href = 'menu.html', 1500);
                } else {
                    localStorage.setItem('targetScore', userTotal);
                    showSplash("Target Set: " + userTotal);
                    setTimeout(() => window.location.href = 'game_bowling.html', 1500);
                }
            } else {
                userTotal += n;
                document.getElementById('userTotalScore').innerText = userTotal;
                if (savedTarget && userTotal > savedTarget) {
                    showSplash("YOU WON!");
                    localStorage.removeItem('targetScore');
                    setTimeout(() => window.location.href = 'menu.html', 1500);
                }
            }
        }
        function showSplash(text) {
            const s = document.getElementById('splash-screen');
            s.innerText = text; s.style.display = 'flex';
            setTimeout(() => { s.style.display = 'none'; }, 1500);
        }
    </script>
</body>
</html>
