<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toss Result</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 50px; }
        .result-box { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid #38bdf8; display: inline-block; }
        button { padding: 15px 30px; font-size: 1.2rem; margin: 10px; border-radius: 10px; border: none; cursor: pointer; background: #38bdf8; color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="result-box" id="resultArea">
        <h1 id="resultText">You Won The Toss!</h1>
        <p>Choose your action:</p>
        <button onclick="startGame('batting')">Batting</button>
        <button onclick="startGame('bowling')">Bowling</button>
    </div>

    <script>
        function startGame(choice) {
            if (choice === 'batting') {
                window.location.href = 'game_batting.html';
            } else {
                window.location.href = 'game_bowling.html';
            }
        }
        
        // ടോസ് തോറ്റാൽ എഐ ബാറ്റിംഗ് എടുക്കുന്ന ലോജിക് വേണമെങ്കിൽ ഇവിടെ ചേർക്കാം
    </script>
</body>
</html>
