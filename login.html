<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Hand Cricket</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { text-align: center; padding: 40px; border: 2px solid #38bdf8; border-radius: 20px; background: #1e293b; }
        button { padding: 15px 30px; background: #38bdf8; border: none; border-radius: 10px; color: #0f172a; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Hand Cricket</h1>
        <button id="loginBtn">Login with Google</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwU8tbkZ-HPXkAtE8dwARTQ1O6rzlpCZ0",
            authDomain: "handcricket-d8952.firebaseapp.com",
            projectId: "handcricket-d8952",
            storageBucket: "handcricket-d8952.firebasestorage.app",
            messagingSenderId: "231097780026",
            appId: "1:231097780026:web:facf5d9cede69df1f9b203"
        };
        firebase.initializeApp(firebaseConfig);

        const provider = new firebase.auth.GoogleAuthProvider();
        document.getElementById('loginBtn').addEventListener('click', () => {
            firebase.auth().signInWithPopup(provider).then((result) => {
                const user = result.user;
                // യൂസർനെയിം സേവ് ചെയ്യുന്നു
                localStorage.setItem('username', user.displayName);
                // റീഡയറക്റ്റ് ചെയ്യുന്നു
                window.location.replace('nickname.html');
            }).catch((error) => {
                console.error("Login Error: ", error);
                alert("Login Error: " + error.message);
            });
        });
    </script>
</body>
</html>
