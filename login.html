<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hand Cricket</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { text-align: center; padding: 40px; border: 2px solid #38bdf8; border-radius: 20px; background: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { margin-bottom: 20px; color: #38bdf8; }
        button { padding: 15px 30px; background: #38bdf8; border: none; border-radius: 10px; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #7dd3fc; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Hand Cricket</h1>
        <p>Login to start your game</p>
        <button id="loginBtn">Sign in with Google</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, getRedirectResult } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwU8tbkZ-HPXkAtE8dwARTQ1O6rzlpCZ0",
            authDomain: "handcricket-d8952.firebaseapp.com",
            projectId: "handcricket-d8952",
            storageBucket: "handcricket-d8952.firebasestorage.app",
            messagingSenderId: "231097780026",
            appId: "1:231097780026:web:facf5d9cede69df1f9b203"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ലോഗിൻ റിസൾട്ട് ചെക്ക് ചെയ്യുന്നു
        getRedirectResult(auth).then((result) => {
            if (result) {
                localStorage.setItem('username', result.user.displayName);
                window.location.href = 'nickname.html';
            } else {
                // ഓൾറെഡി ലോഗിൻ ആണെങ്കിൽ നേരെ നിക്ക് നെയിമിലേക്ക്
                const user = auth.currentUser;
                if (user) {
                    window.location.href = 'nickname.html';
                }
            }
        }).catch((error) => {
            console.error("Auth Error:", error);
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithRedirect(auth, provider);
        });
    </script>
</body>
</html>
