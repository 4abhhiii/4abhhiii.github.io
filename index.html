<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abinavom Reji | Portfolio</title>
    <style>
        body {
            background-color: #000000;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background-color: #111111; /* Slightly lighter than pure black for contrast */
            border: 1px solid #333;
            padding: 0;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            overflow: hidden;
        }

        .profile-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            /* Removed border-radius and border to fill the square space */
        }

        .content-area {
            padding: 30px;
        }

        h1 { color: #38bdf8; font-size: 2rem; margin: 10px 0; }

        .sub-heading { 
            color: #94a3b8; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        p { color: #cbd5e1; margin-bottom: 25px; }

        .btn {
            display: inline-block;
            padding: 12px 40px;
            border: 2px solid #38bdf8;
            border-radius: 10px;
            color: #38bdf8;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn:hover { background: #38bdf8; color: #000000; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="profile.jpg" alt="Abinavom Reji" class="profile-img">
        
        <div class="content-area">
            <h1>Abinavom Reji</h1>
            <div class="sub-heading">Student & Creator</div>
            <p>Passionate about coding, video editing, and digital innovation.</p>
            <a href="#about" class="btn">Learn More</a>
        </div>
    </div>

</body>
</html>
