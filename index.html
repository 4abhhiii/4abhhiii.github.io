<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abinavom Reji | Student Portfolio</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .profile-card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
            margin-bottom: 20px;
        }
        h1 {
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
            color: #38bdf8;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bio {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="profile.jpg" alt="Tick's Profile Photo" class="profile-img">
        
        <h1>Tick</h1>
        <div class="subtitle">Student & Creator</div>
        
        <p class="bio">
            Welcome to my space! I am a student passionate about building things with code, editing short-form video content, and exploring technology straight from my device.
        </p>
    </div>
<p style="text-align: center; margin-top: 30px;">
    <a href="about.html" style="color: #38bdf8; font-weight: bold; text-decoration: none; font-size: 1.2rem;">Click here to know about me</a>
</p>

</html>
